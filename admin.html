<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manage Apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: #f1f5f9;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .login-box, .admin-box {
            background: #1e293b;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            background: #0f172a;
            color: white;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .delete-btn {
            background: #ef4444;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .app-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .hidden {
            display: none;
        }
        h2 {
            margin-bottom: 20px;
        }
        .status {
            background: #10b981;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Admin Panel</h1>
    <p>Dito ka mag-uupload ng links — automatic mapupunta sa Downloader Hub</p>

    <!-- Login Form -->
    <div id="loginForm" class="login-box">
        <h2>🔐 Admin Login</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p style="margin-top: 15px; font-size: 12px;">default: admin / paps123</p>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div id="adminDashboard" class="hidden">
        <div class="admin-box">
            <h2>➕ Add New App Link</h2>
            <div class="status" id="saveStatus">Ready</div>
            <input type="text" id="appName" placeholder="App Name (ex: Spotify Premium)">
            <input type="text" id="appCategory" placeholder="Category (Music, Games, Tools)">
            <textarea id="appDesc" rows="2" placeholder="Description"></textarea>
            <input type="url" id="appDownloadUrl" placeholder="Direct download link (apk, zip, etc.)">
            <button id="addAppBtn">➕ Add to Hub</button>
        </div>

        <div class="admin-box">
            <h2>📋 Manage Existing Apps</h2>
            <div id="appsList"></div>
        </div>
    </div>
</div>

<script>
    // Storage key na gagamitin ng BOTH admin at downloader hub
    const STORAGE_KEY = "paps_downloader_hub_apps";
    
    let apps = [];
    let isLoggedIn = false;

    // Load apps from localStorage
    function loadApps() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if(stored) {
            apps = JSON.parse(stored);
        } else {
            // Default sample apps
            apps = [
                {
                    id: Date.now() + 1,
                    name: "Spotify Premium",
                    category: "Music",
                    description: "Ad-free music, unlimited skips, offline mode.",
                    downloadUrl: "https://example.com/spotify.apk"
                },
                {
                    id: Date.now() + 2,
                    name: "Mobile Legends",
                    category: "Games",
                    description: "5v5 MOBA smooth gameplay.",
                    downloadUrl: "https://example.com/mlbb.apk"
                }
            ];
            saveApps();
        }
        renderAppsList();
    }

    function saveApps() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
        // Update status na naka-save na
        const status = document.getElementById("saveStatus");
        if(status) {
            status.textContent = "✓ Saved to storage";
            status.style.background = "#10b981";
            setTimeout(() => {
                if(status) status.textContent = "Ready";
            }, 1500);
        }
    }

    function addApp(name, category, desc, url) {
        const newApp = {
            id: Date.now(),
            name: name.trim(),
            category: category.trim(),
            description: desc.trim(),
            downloadUrl: url.trim()
        };
        apps.push(newApp);
        saveApps();
        renderAppsList();
        clearForm();
    }

    function deleteApp(id) {
        apps = apps.filter(app => app.id != id);
        saveApps();
        renderAppsList();
    }

    function renderAppsList() {
        const container = document.getElementById("appsList");
        if(!container) return;
        
        if(apps.length === 0) {
            container.innerHTML = "<p>No apps yet. Add one above.</p>";
            return;
        }
        
        container.innerHTML = "";
        apps.forEach(app => {
            const div = document.createElement("div");
            div.className = "app-item";
            div.innerHTML = `
                <div>
                    <strong>📦 ${escapeHtml(app.name)}</strong><br>
                    <small>${escapeHtml(app.category)}</small><br>
                    <small style="color:#94a3b8;">${escapeHtml(app.downloadUrl)}</small>
                </div>
                <button class="delete-btn" data-id="${app.id}">🗑 Delete</button>
            `;
            container.appendChild(div);
        });
        
        // Attach delete events
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                deleteApp(id);
            });
        });
    }

    function clearForm() {
        document.getElementById("appName").value = "";
        document.getElementById("appCategory").value = "";
        document.getElementById("appDesc").value = "";
        document.getElementById("appDownloadUrl").value = "";
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Login logic
    document.getElementById("loginBtn")?.addEventListener("click", () => {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        if(user === "admin" && pass === "paps123") {
            isLoggedIn = true;
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("adminDashboard").classList.remove("hidden");
            loadApps();
        } else {
            alert("Wrong credentials! Use admin / paps123");
        }
    });

    // Add app button
    document.getElementById("addAppBtn")?.addEventListener("click", () => {
        const name = document.getElementById("appName").value;
        const cat = document.getElementById("appCategory").value;
        const desc = document.getElementById("appDesc").value;
        const url = document.getElementById("appDownloadUrl").value;
        
        if(!name || !url) {
            alert("App Name and Download Link are required!");
            return;
        }
        addApp(name, cat, desc, url);
        alert("✓ App added! Check mo sa downloader hub.");
    });
</script>
</body>
</html>
