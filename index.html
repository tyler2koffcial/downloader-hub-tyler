<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>DownloadHub | No Login Required</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 1.5rem;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 1.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
    color: white;
  }
  .header h1 {
    font-size: 2.5rem;
    font-weight: 800;
  }
  .header p {
    opacity: 0.95;
    margin-top: 0.5rem;
  }

  /* Admin Section (only for you) */
  .admin-section {
    border-top: 4px solid #f59e0b;
  }
  .admin-toggle {
    background: #f59e0b;
    color: #333;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 2rem;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 1rem;
  }

  button {
    background: #667eea;
    color: white;
    border: none;
    padding: 0.7rem 1.5rem;
    border-radius: 2rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { transform: translateY(-2px); }
  .btn-copy { background: #10b981; padding: 0.3rem 1rem; font-size: 0.8rem; }
  .btn-delete { background: #ef4444; padding: 0.3rem 1rem; font-size: 0.8rem; }

  input, textarea, select {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid #e2e8f0;
    border-radius: 1rem;
    margin-bottom: 1rem;
  }
  label {
    font-weight: 600;
    display: block;
    margin-bottom: 0.3rem;
    font-size: 0.85rem;
    color: #334155;
  }

  /* Links Grid */
  .links-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-top: 1.5rem;
    max-height: 500px;
    overflow-y: auto;
  }
  .link-row {
    background: #f8fafc;
    border-radius: 1rem;
    padding: 1rem;
    border: 1px solid #e2e8f0;
  }
  .link-title {
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .link-url {
    background: #eef2ff;
    padding: 0.5rem;
    border-radius: 0.75rem;
    font-family: monospace;
    font-size: 0.7rem;
    word-break: break-all;
    margin: 0.5rem 0;
  }
  .link-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

  /* Download View */
  .download-view { text-align: center; }
  .file-icon { font-size: 4rem; margin-bottom: 1rem; }
  .file-name { font-size: 1.8rem; font-weight: 700; margin: 0.5rem 0; }
  .captcha-box {
    background: #f1f5f9;
    padding: 1.5rem;
    border-radius: 1rem;
    margin: 1.5rem 0;
  }
  .captcha-code {
    font-family: monospace;
    font-size: 2rem;
    letter-spacing: 0.5rem;
    background: #1e293b;
    color: white;
    display: inline-block;
    padding: 0.5rem 1rem;
    border-radius: 1rem;
    margin-bottom: 1rem;
  }
  .countdown-timer { font-size: 2rem; font-weight: 800; color: #667eea; margin: 1rem 0; }
  .alert {
    padding: 0.8rem;
    border-radius: 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .alert.show { display: block; }
  .alert-success { background: #d1fae5; color: #065f46; }
  .alert-error { background: #fee2e2; color: #991b1b; }
  .empty-state { text-align: center; padding: 2rem; color: #94a3b8; }
  hr { margin: 1.5rem 0; border-top: 1px solid #e2e8f0; }

  @media (max-width: 640px) {
    body { padding: 1rem; }
    .card { padding: 1rem; }
    .file-name { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📦 DownloadHub</h1>
    <p>Create & share protected download links - No login for downloaders!</p>
  </div>

  <!-- ADMIN SECTION (Hidden by default, only you will open this) -->
  <div class="card admin-section" id="adminSection" style="display: none;">
    <button class="admin-toggle" id="hideAdminBtn">🔒 Hide Admin Panel</button>
    <h2 style="margin-bottom: 1rem;">🔧 Admin Generator</h2>
    <p style="margin-bottom: 1rem; color: #64748b;">Create download links - Share them anywhere!</p>
    <div id="adminAlert" class="alert"></div>
    
    <label>📄 File Title</label>
    <input type="text" id="fileTitle" placeholder="e.g., Adobe Photoshop 2024">
    
    <label>📝 Description</label>
    <textarea id="fileDesc" rows="2" placeholder="Short description..."></textarea>
    
    <label>🏷 Category</label>
    <select id="fileCategory">
      <option value="Software">💻 Software</option>
      <option value="Ebooks">📚 Ebooks</option>
      <option value="Games">🎮 Games</option>
      <option value="Music">🎵 Music</option>
      <option value="Other">📁 Other</option>
    </select>
    
    <label>🔗 Direct Download Link</label>
    <input type="text" id="directUrl" placeholder="https://drive.google.com / mediafire link">
    
    <button id="generateBtn" style="width: 100%;">✨ Generate Shareable Link</button>
    
    <hr>
    <h3>📋 Your Links</h3>
    <div id="linksListContainer" class="links-grid">
      <div class="empty-state">No links yet. Create your first one ⬆️</div>
    </div>
  </div>

  <!-- SHOW ADMIN BUTTON -->
  <div style="text-align: center; margin-bottom: 1rem;">
    <button id="showAdminBtn" class="admin-toggle" style="background: #f59e0b;">🔧 Admin Panel (Click to manage links)</button>
  </div>

  <!-- DOWNLOAD VIEW (shown when ?id=xxx) -->
  <div id="downloadView" class="card" style="display: none;"></div>
</div>

<script>
  // DATABASE - links are saved in browser
  let allLinks = [];
  let currentCaptcha = '';
  let countdownInterval = null;

  // Load/Save
  function saveLinks() {
    localStorage.setItem('downloadhub_links', JSON.stringify(allLinks));
  }

  function loadLinks() {
    const raw = localStorage.getItem('downloadhub_links');
    if (raw) {
      allLinks = JSON.parse(raw);
    } else {
      // Sample data
      allLinks = [];
      saveLinks();
    }
  }

  // Helpers
  function makeId() {
    return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
  }

  function getIcon(cat) {
    const map = {
      'Software': '💻',
      'Ebooks': '📚',
      'Games': '🎮',
      'Music': '🎵',
      'Other': '📁'
    };
    return map[cat] || '📄';
  }

  function getShareableUrl(id) {
    const base = window.location.href.split('?')[0];
    return `${base}?id=${id}`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showAdminAlert(msg, type = 'success') {
    const alertDiv = document.getElementById('adminAlert');
    if (alertDiv) {
      alertDiv.className = `alert alert-${type} show`;
      alertDiv.innerText = msg;
      setTimeout(() => alertDiv.classList.remove('show'), 3000);
    }
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(text);
      showAdminAlert('✅ Link copied! Share it anywhere.', 'success');
    } catch(e) {
      alert('Copy: ' + text);
    }
  }

  // Generate Link
  function generateLink() {
    const title = document.getElementById('fileTitle').value.trim();
    const desc = document.getElementById('fileDesc').value.trim();
    const category = document.getElementById('fileCategory').value;
    const directLink = document.getElementById('directUrl').value.trim();

    if (!title || !desc || !directLink) {
      showAdminAlert('❌ All fields required', 'error');
      return;
    }
    if (!directLink.startsWith('http')) {
      showAdminAlert('⚠️ Link must start with http:// or https://', 'error');
      return;
    }

    const newLink = {
      id: makeId(),
      title: title,
      desc: desc,
      category: category,
      directLink: directLink,
      downloads: 0,
      createdAt: new Date().toISOString()
    };
    allLinks.push(newLink);
    saveLinks();
    renderLinks();
    
    document.getElementById('fileTitle').value = '';
    document.getElementById('fileDesc').value = '';
    document.getElementById('directUrl').value = '';
    showAdminAlert(`✅ Link created! Share this: ${getShareableUrl(newLink.id)}`, 'success');
  }

  // Render admin links
  function renderLinks() {
    const container = document.getElementById('linksListContainer');
    if (!container) return;
    
    if (allLinks.length === 0) {
      container.innerHTML = '<div class="empty-state">✨ No links yet. Create one above.</div>';
      return;
    }
    container.innerHTML = '';
    allLinks.forEach(link => {
      const url = getShareableUrl(link.id);
      const div = document.createElement('div');
      div.className = 'link-row';
      div.innerHTML = `
        <div class="link-title">
          <span>${getIcon(link.category)} ${escapeHtml(link.title)}</span>
          <span style="font-size:0.7rem;">⬇️ Downloaded: ${link.downloads || 0}</span>
        </div>
        <div class="link-meta">${link.category} • ${new Date(link.createdAt).toLocaleDateString()}</div>
        <div class="link-url">🔗 ${escapeHtml(url)}</div>
        <div class="link-actions">
          <button class="btn-copy" data-url="${url}">📋 Copy Link</button>
          <button class="btn-delete" data-id="${link.id}">🗑 Delete</button>
        </div>
      `;
      container.appendChild(div);
    });

    document.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', (e) => copyText(btn.getAttribute('data-url')));
    });
    document.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        if (confirm('Delete this link?')) {
          allLinks = allLinks.filter(l => l.id !== id);
          saveLinks();
          renderLinks();
          // If currently viewing deleted link, reload
          const params = new URLSearchParams(window.location.search);
          if (params.get('id') === id) {
            window.location.href = window.location.href.split('?')[0];
          }
        }
      });
    });
  }

  // CAPTCHA
  function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
    let code = '';
    for (let i = 0; i < 5; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    currentCaptcha = code;
    return code;
  }

  function startCountdown(seconds, onTick, onComplete) {
    let remaining = seconds;
    if (countdownInterval) clearInterval(countdownInterval);
    onTick(remaining);
    countdownInterval = setInterval(() => {
      remaining--;
      if (remaining >= 0) {
        onTick(remaining);
      }
      if (remaining < 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;
        onComplete();
      }
    }, 1000);
  }

  // DOWNLOAD PAGE - NO LOGIN REQUIRED!
  function renderDownloadView(file) {
    const viewDiv = document.getElementById('downloadView');
    const captchaCode = generateCaptcha();
    
    viewDiv.innerHTML = `
      <div class="download-view">
        <div class="file-icon">${getIcon(file.category)}</div>
        <div class="file-name">${escapeHtml(file.title)}</div>
        <p style="color: #475569; margin-bottom: 0.5rem;">${escapeHtml(file.desc)}</p>
        <p style="font-size: 0.8rem; color: #64748b;">📥 Downloaded ${file.downloads || 0} times</p>
        
        <div class="captcha-box" id="captchaBox">
          <div style="font-weight: 600; margin-bottom: 0.8rem;">🔒 Enter CAPTCHA to continue</div>
          <div class="captcha-code" id="captchaCodeDisplay">${captchaCode}</div>
          <input type="text" id="captchaInput" placeholder="Type code above" style="text-align: center; max-width: 200px; margin: 0.8rem auto; display: block;">
          <button id="verifyCaptchaBtn">✅ Verify CAPTCHA</button>
        </div>
        
        <div id="countdownArea" style="margin-top: 1rem;"></div>
        <div id="downloadButtonArea" style="margin-top: 1rem;"></div>
      </div>
    `;

    const verifyBtn = document.getElementById('verifyCaptchaBtn');
    verifyBtn.addEventListener('click', () => {
      const userInput = document.getElementById('captchaInput').value.trim().toUpperCase();
      if (userInput === currentCaptcha) {
        document.getElementById('captchaBox').style.display = 'none';
        const countdownDiv = document.getElementById('countdownArea');
        countdownDiv.innerHTML = `
          <div style="background: #e0e7ff; padding: 1rem; border-radius: 1rem;">
            <p style="font-weight: 600;">✅ CAPTCHA Verified!</p>
            <div class="countdown-timer" id="timerDisplay">5</div>
            <p>Please wait before download...</p>
          </div>
        `;
        
        startCountdown(5, (sec) => {
          const timerSpan = document.getElementById('timerDisplay');
          if (timerSpan) timerSpan.innerText = sec;
        }, () => {
          // Update download count
          file.downloads = (file.downloads || 0) + 1;
          saveLinks();
          
          const downloadArea = document.getElementById('downloadButtonArea');
          downloadArea.innerHTML = `
            <a href="${file.directLink}" target="_blank" style="display: inline-block; background: #10b981; color: white; padding: 1rem 2rem; border-radius: 2rem; text-decoration: none; font-weight: bold; margin-top: 1rem;">
              ⬇ CLICK TO DOWNLOAD NOW
            </a>
          `;
        });
      } else {
        alert('❌ Wrong CAPTCHA! Try again.');
        const newCode = generateCaptcha();
        document.getElementById('captchaCodeDisplay').innerText = newCode;
        document.getElementById('captchaInput').value = '';
      }
    });
  }

  function showNotFound() {
    const viewDiv = document.getElementById('downloadView');
    viewDiv.style.display = 'block';
    viewDiv.innerHTML = `
      <div style="text-align:center; padding:2rem;">
        <span style="font-size:3rem;">🔗❌</span>
        <h3>Link not found or expired</h3>
        <p>The file may have been removed.</p>
      </div>
    `;
    document.getElementById('adminSection').style.display = 'none';
    document.getElementById('showAdminBtn').style.display = 'block';
  }

  // ROUTING - check if there's a download id in URL
  function checkRoute() {
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get('id');
    
    if (fileId) {
      // Someone is trying to download - NO LOGIN NEEDED!
      const file = allLinks.find(l => l.id === fileId);
      if (file) {
        document.getElementById('downloadView').style.display = 'block';
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('showAdminBtn').style.display = 'none';
        renderDownloadView(file);
      } else {
        showNotFound();
      }
    } else {
      // No download ID - show admin panel (if toggled)
      document.getElementById('downloadView').style.display = 'none';
      document.getElementById('adminSection').style.display = 'none';
      document.getElementById('showAdminBtn').style.display = 'block';
    }
  }

  // Admin panel toggle
  let adminVisible = false;
  function toggleAdmin() {
    const adminSection = document.getElementById('adminSection');
    const showBtn = document.getElementById('showAdminBtn');
    
    if (adminVisible) {
      adminSection.style.display = 'none';
      showBtn.style.display = 'block';
      adminVisible = false;
    } else {
      adminSection.style.display = 'block';
      showBtn.style.display = 'none';
      adminVisible = true;
      renderLinks(); // refresh links when opening
    }
  }

  // INIT
  function init() {
    loadLinks();
    
    document.getElementById('showAdminBtn').addEventListener('click', toggleAdmin);
    document.getElementById('hideAdminBtn').addEventListener('click', toggleAdmin);
    document.getElementById('generateBtn').addEventListener('click', generateLink);
    
    checkRoute();
  }
  
  init();
</script>
</body>
</html>
